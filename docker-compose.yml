# docker-compose.yml
version: '3.8'

services:
  p2p-server:
    build: .
    container_name: p2p-learning
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Для разработки можно монтировать директории
      # - ./static:/app/static
      # - ./certs:/app/certs
      - p2p-logs:/app/logs
    environment:
      - TZ=Europe/Moscow
    networks:
      - p2p-network

  # Опционально: автоматическое обновление сертификатов Let's Encrypt
  certbot:
    image: certbot/certbot
    container_name: p2p-certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./webroot:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - p2p-network

networks:
  p2p-network:
    driver: bridge

volumes:
  p2p-logs:
